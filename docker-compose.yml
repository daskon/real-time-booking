version: '3.8'

services:

  node:
    build: ./backend-node
    ports:
      - "5050:5050"
    volumes:
      - ./backend-node:/app
      - node_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  laravel:
    build: ./backend-laravel
    container_name: starterkit_laravel
    volumes:
      - ./backend-laravel:/var/www
    env_file:
      - ./backend-laravel/.env.docker
    command: >
      sh -c "
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php-fpm"

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./backend-laravel:/var/www
      - ./backend-laravel/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: starterkit
    ports:
      - "3306:3306"

volumes:
  node_node_modules: